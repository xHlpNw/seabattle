<!-- Battleship Game Page HTML -->
<div class="game-page">
  <header class="topbar">
    <a routerLink="/" class="logo">⚓ BATTLESHIP</a>
    <div class="enemy-tag">{{ opponentName }}</div>
  </header>
  <p class="turn-hint" *ngIf="!gameOver">{{ isPlayerTurn ? 'Your turn — tap enemy grid' : "Opponent's turn" }}</p>
  <main class="boards-wrapper">

    <!-- PLAYER BOARD -->
    <section class="board-container">
      <h3 class="board-title">YOUR FLEET</h3>
      <div class="grid player-grid">
        <div *ngFor="let row of playerBoard; let i = index" class="row">
          <div *ngFor="let cell of row; let j = index"
               class="cell"
               [ngClass]="{
                 'empty': cell === 0,
                 'ship': cell === 1,
                 'hit': cell === 3,
                 'miss': cell === 2
               }">
          </div>
        </div>
      </div>
    </section>

    <!-- ENEMY BOARD -->
    <section class="board-container">
      <h3 class="board-title">ENEMY WATERS</h3>
      <div class="grid enemy-grid">
        <div *ngFor="let row of enemyBoard; let i = index" class="row">
          <div *ngFor="let cell of row; let j = index"
               class="cell"
               [ngClass]="{
                 'empty': cell === 0,
                 'ship': cell === 1,
                 'hit': cell === 3,
                 'miss': cell === 2,
                 'disabled': !isPlayerTurn
               }"
               [style.cursor]="isPlayerTurn ? 'pointer' : 'not-allowed'"
               (click)="attackEnemy(i,j)">
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="game-footer">
    <button class="surrender" (click)="surrender()">SURRENDER</button>
  </footer>

  <!-- MODAL: результат игры -->
  <div class="modal-backdrop" *ngIf="showResultModal">
    <div class="modal-window">
      <div class="game-result-status" [ngClass]="{'victory': gameResultStatus === 'VICTORY', 'defeat': gameResultStatus === 'DEFEAT'}">
        {{ gameResultStatus }}
      </div>
      <p class="game-result-text" *ngIf="resultText">{{ resultText }}</p>
      <p class="game-result-error" *ngIf="createGameError">{{ createGameError }}</p>
      <p class="rematch-waiting" *ngIf="!isBotGame && rematchRequestPending">Ожидание ответа противника…</p>
      <p class="rematch-declined" *ngIf="!isBotGame && rematchDeclinedMessage">Противник отказался от реванша.</p>
      <div class="modal-actions">
        <button (click)="isBotGame ? startNewBotGame() : requestRematch()" [disabled]="startingNewGame || (!isBotGame && rematchRequestPending)">
          {{ isBotGame && startingNewGame ? 'Создание игры…' : (!isBotGame && rematchRequestPending ? 'Ожидание…' : 'New Game') }}
        </button>
        <button (click)="goToHome()">Back to Menu</button>
      </div>
    </div>
  </div>

  <!-- MODAL: предложение реванша (только онлайн) -->
  <div class="modal-backdrop" *ngIf="rematchRequestedBy">
    <div class="modal-window rematch-proposal">
      <p class="rematch-proposal-text">{{ rematchRequestedBy }} предлагает реванш</p>
      <div class="modal-actions">
        <button class="accept" (click)="acceptRematch()">Принять</button>
        <button class="decline" (click)="declineRematch()">Отказаться</button>
      </div>
    </div>
  </div>
</div>
