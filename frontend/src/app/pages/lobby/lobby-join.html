<!-- Lobby Join Page -->
<div class="lobby-page">
  <header class="topbar">
    <a routerLink="/" class="logo">⚓ МОРСКОЙ БОЙ</a>
    <button class="back-btn" (click)="backToHome()">← НАЗАД</button>
  </header>

  <main class="lobby-content">
    <div class="lobby-container">
      <h1>ПРИСОЕДИНЕНИЕ К ЛОББИ</h1>

      <div class="lobby-setup" *ngIf="isJoining">
        <div class="waiting-indicator">
          <div class="spinner"></div>
          <p>Присоединение к лобби…</p>
        </div>
      </div>

      <div class="lobby-setup" *ngIf="!isJoining && !joinError">
        <div class="waiting-indicator">
          <div class="spinner"></div>
          <p>Вы присоединились к лобби игрока {{ hostUsername }}!</p>
          <p>Переход в лобби…</p>
        </div>
      </div>

      <div class="lobby-setup" *ngIf="joinError">
        <div class="error-message">
          <h3>Не удалось войти в лобби</h3>
          <p>{{ joinError }}</p>
          <button class="create-game-btn" (click)="backToHome()">НА ГЛАВНУЮ</button>
        </div>
      </div>
    </div>
  </main>
</div>
