<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Морской бой</title>
  <link rel="stylesheet" href="login.scss" />
</head>
<body>
  <div class="container">
    <div class="logo">
    <div class="icon">⚓</div>
    <h1>МОРСКОЙ БОЙ</h1>
  </div>


  <div class="login-box">
    <h2>ВХОД</h2>
    <form>
      <label>ИМЯ ПОЛЬЗОВАТЕЛЯ</label>
      <div class="input-group">
        <input type="text" [(ngModel)]="username" name="username" placeholder="логин" >
      </div>


      <label>ПАРОЛЬ</label>
      <div class="input-group">
        <input type="password" [(ngModel)]="password" name="password" placeholder="пароль" >
      </div>

      <div class="error" [class.visible]="errorMsg" role="alert">
        {{ errorMsg || ' ' }}
      </div>

      <button type="button" class="btn" (click)="doLogin()">ВОЙТИ</button>

      <div class="links">
        <a href="/register">Регистрация</a>
        <a href="#">← На главную</a>
      </div>
    </form>
  </div>



</div>
</body>
</html>
