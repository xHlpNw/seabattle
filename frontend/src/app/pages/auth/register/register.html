<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="register.scss" />
    <title>Регистрация — Морской бой</title>
  </head>
  <body>
    <div class="container">
      <div class="logo">
      <div class="icon">⚓</div>
      <h1>МОРСКОЙ БОЙ</h1>
    </div>

    <div class="register-box">
      <h2>СОЗДАТЬ АККАУНТ</h2>
      <form>
        <label>ИМЯ ПОЛЬЗОВАТЕЛЯ</label>
        <div class="input-group">
          <input type="text" [(ngModel)]="username" name="username" placeholder="логин" >
        </div>


        <label>ПАРОЛЬ</label>
        <div class="input-group">
          <input type="password" [(ngModel)]="password" name="password" placeholder="Введите пароль" >
        </div>


        <label>Подтверждение пароля</label>
        <div class="input-group">
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Повторите пароль" >
        </div>

        <div class="error" [class.visible]="errorMsg">
          {{ errorMsg || ' ' }}
        </div>

        <button type="button" class="btn" (click)="doRegister()">ЗАРЕГИСТРИРОВАТЬСЯ</button>

        <div class="links">
          <a href="/login">Вход</a>
          <a href="#">← На главную</a>
        </div>
      </form>
    </div>
  </div>
  </body>
</html>
