# Production profile
# Activate with: spring.profiles.active=prod
# Required env vars (no defaults): SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME,
#   SPRING_DATASOURCE_PASSWORD, JWT_SECRET
# Optional:
#   CORS_ALLOWED_ORIGINS  - exact frontend origin(s), comma-separated.
#                           Default "*" (safe here: JWT is in Authorization header,
#                           no cookies / credentials are used).
#   JWT_EXPIRATION_MS     - JWT lifetime in milliseconds (default 24h).

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate   # Schema only from Flyway; never auto-create/update in prod
    show-sql: false
  flyway:
    clean-disabled: true   # Never allow Flyway clean in production

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:*}"

logging:
  level:
    root: WARN
    com.seabattle: INFO
    org.springframework: WARN
